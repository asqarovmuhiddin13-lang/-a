<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hujjatlar</title>
    <style>
        body { margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; background: #000; overflow: hidden; }
        .slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; width: 100%; height: 100%; scroll-behavior: smooth; }
        .slider img { flex-shrink: 0; width: 100%; height: 100%; object-fit: contain; scroll-snap-align: center; }
        .counter { position: absolute; top: 20px; color: white; font-family: sans-serif; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; pointer-events: none; }
    </style>
</head>
<body>
    <div class="counter">Rasmlarni suring &rarr;</div>
    <div class="slider">
        <img src="1.jpg">
        <img src="2.jpg">
        <img src="3.jpg">
        <img src="4.jpg">
        <img src="5.jpg">
        <img src="6.jpg">
        <img src="7.jpg">
        <img src="8.jpg">
    </div>
</body>
</html>
